# Runs R CMD check (including the testthat suite) and lintr on public
# GitHub-hosted runners. Workflow derived from the standard r-lib/actions
# examples: https://github.com/r-lib/actions/tree/v2/examples
name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # shinytest2 drives the bundled Shiny app in a headless Chrome,
          # which is pre-installed on the GitHub-hosted runners.
          extra-packages: |
            any::rcmdcheck
            any::shinytest2
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          # 1 expected NOTE (bslib is used only by the bundled Shiny app),
          # so fail on errors and warnings but not on notes.
          error-on: '"warning"'
          upload-snapshots: true

  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr
          needs: lint

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: false
